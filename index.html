<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ระบบเช็คชื่อเข้าเรียน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-gray-800">

  <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center transition-all duration-300">
    <div class="flex flex-col items-center">
      <div class="relative">
        <img id="userPicture" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23a0aec0'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" class="w-24 h-24 rounded-full border-4 border-indigo-500 shadow-md object-cover">
      </div>
      <h2 id="userName" class="text-xl font-bold mt-4 text-gray-700">กำลังโหลดข้อมูล...</h2>
      <p id="userIdDisplay" class="text-xs text-gray-400 mt-1 font-mono break-all"></p>
    </div>

    <div class="mt-8 space-y-3">
      <button onclick="requestLocationAndCheckIn('มาเรียน')" class="w-full bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white font-medium py-3 px-6 rounded-xl shadow-lg transition-all duration-150">
        📍 มาเรียน (เช็คพิกัด)
      </button>
      <button onclick="sendCheckIn('ลา', null, null)" class="w-full bg-amber-500 hover:bg-amber-600 active:scale-95 text-white font-medium py-3 px-6 rounded-xl shadow-lg transition-all duration-150">
        ✉️ ลาเรียน
      </button>
    </div>

    <div id="statusMessage" class="hidden mt-6 p-3 rounded-lg text-sm font-medium"></div>
  </div>

  <script>
    // ⚠️ ระบุข้อมูล ID และลิงก์ Web App ของคุณที่นี่
    const LIFF_ID = "2010265713-TY9AG6dR"; 
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzxkzkg9NaPBEBcr9pRzrCZieXcUYMku7OiCZA1h1bKEXknV_kncClO0mp5CVCVxbJzAg/exec";

    window.onload = function () {
      initializeLiff();
    }

    function initializeLiff() {
      liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) liff.login();
        else getUserProfile();
      }).catch(err => showStatus("โหลด LIFF ไม่สำเร็จ", false));
    }

    function getUserProfile() {
      liff.getProfile().then(profile => {
        document.getElementById("userName").innerText = "สวัสดี, " + profile.displayName;
        document.getElementById("userIdDisplay").innerText = "ID: " + profile.userId;
        if (profile.pictureUrl) document.getElementById("userPicture").src = profile.pictureUrl;
      }).catch(err => showStatus("ดึงโปรไฟล์ไม่สำเร็จ", false));
    }

    // ฟังก์ชันขอพิกัด GPS พร้อมระบบคัดกรอง Error
    function requestLocationAndCheckIn(status) {
      showStatus("กำลังตรวจสอบพิกัด GPS...", null);
      if (!navigator.geolocation) {
        showStatus("เบราว์เซอร์ของคุณไม่รองรับการดึงพิกัด GPS", false);
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          sendCheckIn(status, lat, lng); 
        },
        (error) => {
          // เพิ่มเงื่อนไขการแจ้งเตือนตามจริง เพื่อให้ User ไม่สับสน
          if (error.code === error.TIMEOUT) {
            showStatus("❌ สัญญาณ GPS อ่อนหรือใช้เวลานานเกินไป กรุณากดใหม่อีกครั้งในที่โล่งครับ", false);
          } else if (error.code === error.PERMISSION_DENIED) {
            showStatus("❌ กรุณาเปิดอนุญาตให้เข้าถึงตำแหน่งที่ตั้ง (GPS) ในเบราว์เซอร์ของคุณ", false);
          } else {
            showStatus("❌ ไม่สามารถดึงพิกัดได้ (" + error.message + ")", false);
          }
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function sendCheckIn(status, lat, lng) {
      showStatus("กำลังประมวลผลข้อมูล...", null);
      
      liff.getProfile().then(profile => {
        const payload = {
          action: "liff_checkin",
          userId: profile.userId,
          displayName: profile.displayName,
          status: status,
          latitude: lat,
          longitude: lng
        };

        fetch(GAS_WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            showStatus(`✅ ${data.message}`, true);
            setTimeout(() => liff.closeWindow(), 2500);
          } else {
            showStatus(`❌ ${data.message}`, false);
          }
        })
        .catch(error => showStatus("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์", false));
      });
    }

    function showStatus(msg, success) {
      const statusBox = document.getElementById("statusMessage");
      statusBox.innerText = msg;
      statusBox.classList.remove("hidden", "bg-emerald-100", "text-emerald-800", "bg-rose-100", "text-rose-800", "bg-indigo-100", "text-indigo-800");
      if (success === true) statusBox.classList.add("bg-emerald-100", "text-emerald-800");
      else if (success === false) statusBox.classList.add("bg-rose-100", "text-rose-800");
      else statusBox.classList.add("bg-indigo-100", "text-indigo-800");
    }
  </script>
</body>
</html>
